<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#05020c" />
  <!-- Glowing effects using filters -->
  <defs>
    <linearGradient id="cyberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff007f" />
      <stop offset="50%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Grid Lines in Background -->
  <g stroke="#1a0f30" stroke-width="2" opacity="0.5">
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
  </g>

  <!-- Circular Outer Neurosphere Rim -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#cyberGrad)" stroke-width="12" filter="url(#glow)" />
  <circle cx="256" cy="256" r="160" fill="none" stroke="#ff007f" stroke-width="2" stroke-dasharray="10, 15" opacity="0.8" />
  
  <!-- Coastal Waves (Cyber style) -->
  <path d="M 120 340 Q 180 300 256 340 T 392 340" fill="none" stroke="#00f0ff" stroke-width="6" filter="url(#glow)" />
  <path d="M 100 370 Q 180 340 256 370 T 412 370" fill="none" stroke="#7000ff" stroke-width="4" opacity="0.7" />

  <!-- Conical Mbaru Niang Structure in Cyberpunk wireframe -->
  <polygon points="256,100 160,310 352,310" fill="none" stroke="url(#cyberGrad)" stroke-width="8" filter="url(#glow)" />
  <!-- Internal structural rings -->
  <line x1="208" y1="205" x2="304" y2="205" stroke="#ff007f" stroke-width="4" />
  <line x1="184" y1="257" x2="328" y2="257" stroke="#00f0ff" stroke-width="4" />
  <!-- Center vertical axis (energy node) -->
  <line x1="256" y1="100" x2="256" y2="340" stroke="#fff500" stroke-width="3" stroke-dasharray="5,5" filter="url(#glow)" />

  <!-- Cyber Sun / Core Sphere -->
  <circle cx="256" cy="256" r="45" fill="none" stroke="#fff500" stroke-width="6" filter="url(#glow)" />
  
  <!-- Outer Digital Nodes -->
  <circle cx="256" cy="100" r="12" fill="#fff500" filter="url(#glow)" />
  <circle cx="160" cy="310" r="10" fill="#ff007f" />
  <circle cx="352" cy="310" r="10" fill="#00f0ff" />
  
  <circle cx="256" cy="256" r="12" fill="#39ff14" filter="url(#glow)" />
</svg>
